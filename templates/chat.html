<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Medical AI Chatbot</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            height:100vh;
            background: linear-gradient(135deg,#0f172a,#1e293b,#0f766e);
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        .chat-container{
            width:100%;
            max-width:900px;
            height:90vh;
            padding:20px;
        }

        .chat-card{
            height:100%;
            border:none;
            border-radius:25px;
            overflow:hidden;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display:flex;
            flex-direction:column;
        }

        /* Header */
        .chat-header{
            padding:20px;
            background: rgba(255,255,255,0.08);
            border-bottom:1px solid rgba(255,255,255,0.1);
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .header-left{
            display:flex;
            align-items:center;
        }

        .bot-image{
            width:60px;
            height:60px;
            border-radius:50%;
            border:3px solid #14b8a6;
            margin-right:15px;
        }

        .chat-title{
            color:#fff;
            font-size:22px;
            font-weight:600;
        }

        .chat-subtitle{
            color:#cbd5e1;
            font-size:14px;
        }

        .status{
            display:flex;
            align-items:center;
            color:#22c55e;
            font-size:14px;
        }

        .status-dot{
            width:10px;
            height:10px;
            background:#22c55e;
            border-radius:50%;
            margin-right:8px;
            animation:pulse 1.5s infinite;
        }

        @keyframes pulse{
            0%{
                transform:scale(1);
                opacity:1;
            }
            50%{
                transform:scale(1.5);
                opacity:0.5;
            }
            100%{
                transform:scale(1);
                opacity:1;
            }
        }

        /* Chat Body */
        .chat-body{
            flex:1;
            padding:25px;
            overflow-y:auto;
            scroll-behavior:smooth;
        }

        .chat-body::-webkit-scrollbar{
            width:6px;
        }

        .chat-body::-webkit-scrollbar-thumb{
            background:#14b8a6;
            border-radius:10px;
        }

        .message{
            display:flex;
            margin-bottom:20px;
            animation:fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .message.user{
            justify-content:flex-end;
        }

        .message.bot{
            justify-content:flex-start;
        }

        .message-content{
            max-width:75%;
            padding:14px 18px;
            border-radius:18px;
            position:relative;
            font-size:15px;
            line-height:1.5;
        }

        .user .message-content{
            background: linear-gradient(135deg,#14b8a6,#06b6d4);
            color:#fff;
            border-bottom-right-radius:5px;
        }

        .bot .message-content{
            background: rgba(255,255,255,0.12);
            color:#fff;
            border-bottom-left-radius:5px;
            border:1px solid rgba(255,255,255,0.08);
        }

        .message-time{
            font-size:11px;
            margin-top:6px;
            opacity:0.7;
        }

        .avatar{
            width:40px;
            height:40px;
            border-radius:50%;
            margin:0 10px;
        }

        /* Footer */
        .chat-footer{
            padding:20px;
            background: rgba(255,255,255,0.05);
            border-top:1px solid rgba(255,255,255,0.1);
        }

        .input-group{
            background: rgba(255,255,255,0.08);
            border-radius:50px;
            overflow:hidden;
            padding:5px;
        }

        .type_msg{
            background:transparent !important;
            border:none !important;
            color:white !important;
            height:50px;
            padding-left:20px;
        }

        .type_msg::placeholder{
            color:#cbd5e1;
        }

        .type_msg:focus{
            box-shadow:none !important;
        }

        .send_btn{
            width:55px;
            border:none;
            border-radius:50%;
            background: linear-gradient(135deg,#14b8a6,#06b6d4);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            cursor:pointer;
            transition:0.3s;
        }

        .send_btn:hover{
            transform:scale(1.08);
        }

        .welcome-box{
            text-align:center;
            color:white;
            margin-top:40px;
        }

        .welcome-box i{
            font-size:60px;
            color:#14b8a6;
            margin-bottom:15px;
        }

        .welcome-box h3{
            font-weight:600;
            margin-bottom:10px;
        }

        .welcome-box p{
            color:#cbd5e1;
        }

        @media(max-width:768px){
            .chat-container{
                padding:0;
                height:100vh;
            }

            .chat-card{
                border-radius:0;
            }

            .message-content{
                max-width:85%;
            }
        }

    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-card">

        <!-- Header -->
        <div class="chat-header">
            <div class="header-left">
                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="bot-image">

                <div>
                    <div class="chat-title">Medical AI Assistant</div>
                    <div class="chat-subtitle">24/7 Healthcare Support</div>
                </div>
            </div>

            <div class="status">
                <div class="status-dot"></div>
                Online
            </div>
        </div>

        <!-- Chat Body -->
        <div id="messageFormeight" class="chat-body">

            <div class="welcome-box">
                <i class="fas fa-user-md"></i>
                <h3>Welcome to Medical AI Chatbot</h3>
                <p>Ask about symptoms, medicines, health tips, or medical advice.</p>
            </div>

        </div>

        <!-- Footer -->
        <div class="chat-footer">

            <form id="messageArea">
                <div class="input-group">

                    <input 
                        type="text" 
                        id="text" 
                        name="msg" 
                        placeholder="Type your medical query..." 
                        autocomplete="off" 
                        class="form-control type_msg"
                        required
                    />

                    <div class="input-group-append">
                        <button type="submit" id="send" class="send_btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>

                </div>
            </form>

        </div>

    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<script>

    $(document).ready(function () {

        $("#messageArea").on("submit", function (event) {

            event.preventDefault();

            const date = new Date();
            const hour = date.getHours();
            const minute = date.getMinutes();

            const str_time = hour + ":" + (minute < 10 ? "0" + minute : minute);

            var rawText = $("#text").val();

            // Remove welcome box after first message
            $(".welcome-box").hide();

            // User Message
            var userHtml = `
                <div class="message user">
                    <div class="message-content">
                        ${rawText}
                        <div class="message-time">${str_time}</div>
                    </div>

                    <img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png" class="avatar">
                </div>
            `;

            $("#text").val("");
            $("#messageFormeight").append(userHtml);

            // Auto scroll
            $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

            // AJAX Request
            $.ajax({
                data: {
                    msg: rawText,
                },

                type: "POST",
                url: "/GET",

            }).done(function (data) {

                var botHtml = `
                    <div class="message bot">

                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="avatar">

                        <div class="message-content">
                            ${data}
                            <div class="message-time">${str_time}</div>
                        </div>

                    </div>
                `;

                $("#messageFormeight").append(botHtml);

                // Auto scroll
                $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

            });

        });

    });

</script>

</body>
</html>
